<!DOCTYPE html>
<html>

    <head>
        <meta name="description" content="This is a collection for my self-education." />
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link href="../_shared/styles/bulma.css" rel="stylesheet" />
        <style>
            .intro.section {
                top: 0;
                position: sticky;
                z-index: 2;

                backdrop-filter: blur(10px); /* blur the background behind */
                -webkit-backdrop-filter: blur(10px); /* Safari support */
            }
        </style>

        <script type="text/javascript" src="../_shared/scripts/purify.js"></script>
        <script type="text/javascript" defer>
            class IndexClient {
                static fetchIndexData() {
                    fetch('../_index/data/index.json')
                        .then(response => response.json())
                        .then(IndexClient.renderIndexData)
                        .catch(error => console.error('IndexClient network error:', error));
                }

                static renderIndexData(indexData) {

                    const detailsTemplate = window.document.getElementById('details-template');
                    const listItemTemplate = window.document.getElementById('list-item-template');
                    const indexSection = window.document.querySelector('.index.section');
                    const loadingContainer = window.document.querySelector('.loading.container');

                    loadingContainer.remove();

                    indexData.segments.forEach(segment => {
                        const detailsClone = detailsTemplate.content.cloneNode(true);

                        detailsClone.querySelector('details > summary > code').textContent = segment.clientId;
                        detailsClone.querySelector('details > .notification').textContent = segment.segmentName;

                        segment.documents.forEach(path => {
                            const safePath = DOMPurify.sanitize(path, { ALLOWED_URI_REGEXP: /^https?:/ });
                            const listItemClone = listItemTemplate.content.cloneNode(true);
                            const a = listItemClone.querySelector('a');

                            a.textContent = safePath.replace('index.html', '');
                            a.setAttribute('href', safePath);

                            detailsClone.querySelector('details > ul').appendChild(listItemClone);
                        });

                        indexSection.appendChild(detailsClone);
                    });
                }
            }

            IndexClient.fetchIndexData();
        </script>

        <title>rasx-node-js: my collection of self-educational samples on the Node.js® stack</title>
    </head>

    <body>
        <main>
            <section class="intro section container pb-0">
                <h1 class="is-size-1"><code>rasx-node-js</code></h1>
                <h2 class="is-size-4">🔨🍱 my collection of self-educational samples on the Node.js® stack</h2>
            </section>
            <section class="index section container">
                <div class="loading container is-fluid has-text-centered">
                    <div class="loader is-inline-block image is-128x128 p-6" title="Loading…"></div>
                </div>
            </section>
        </main>
        <footer class="footer">
            <p>📖<a href="https://github.com/BryanWilhite/nodejs#README">README on Github</a></p>
            <p><a href="https://www.linkedin.com/in/wilhite">Bryan Wilhite is on LinkedIn</a>🇺🇸💼</p>
        </footer>

        <template id="details-template">
            <details>
                <summary class="is-size-3"><code></code></summary>
                <div class="notification mt-1 ml-6">
                </div>
                <ul class="ml-6"></ul>
            </details>
        </template>

        <template id="list-item-template">
            <li><a href=""></a></li>
        </template>
    </body>

</html>
